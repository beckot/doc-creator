name: TruffleHog Secret Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history to allow diff scanning

      - name: Install TruffleHog
        env:
          TRUFFLEHOG_VERSION: "3.82.13"
          TRUFFLEHOG_SHA256: "ef33d3df50362e810855b6b0e055ab98096dbbf9c866470e08664a474436d2d2"
        run: |
          set -euo pipefail
          archive="trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/${archive}" -o "${archive}"
          echo "${TRUFFLEHOG_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}" trufflehog
          sudo install -m 0755 trufflehog /usr/local/bin/trufflehog
          rm -f "${archive}" trufflehog
          trufflehog --version

      - name: Run TruffleHog (git history)
        run: |
          set -o pipefail
          trufflehog --no-update git file://. \
            --since-commit=origin/main \
            --branch=HEAD \
            --only-verified \
            --exclude-paths .trufflehogignore \
            --fail \
            --json | tee trufflehog_results.json
        env:
          TRUFFLEHOG_NO_UPDATE: "1"

      - name: Upload TruffleHog report on failure
        if: failure() && hashFiles('trufflehog_results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog_results.json
